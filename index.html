<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Jour 1 Musée | La découverte de Juan</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet (Carte OSM) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .fade-in { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .map-container { z-index: 10; border-radius: 0.75rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icônes SVG inline
        const Icons = {
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        };

        // Générateurs de nombres aléatoires déterministes (basés sur une graine)
        function xmur3(str) {
            let h = 1779033703 ^ str.length;
            for(let i = 0; i < str.length; i++) {
                h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
                h = h << 13 | h >>> 19;
            }
            return function() {
                h = Math.imul(h ^ (h >>> 16), 2246822507);
                h = Math.imul(h ^ (h >>> 13), 3266489909);
                return (h ^= h >>> 16) >>> 0;
            }
        }

        function mulberry32(a) {
            return function() {
              let t = a += 0x6D2B79F5;
              t = Math.imul(t ^ t >>> 15, t | 1);
              t ^= t + Math.imul(t ^ t >>> 7, t | 61);
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        // Liste de pays garantissant de bons résultats sur OSM
        const COUNTRIES = [
            'FR', 'ES', 'IT', 'DE', 'GB', 'US', 'JP', 'BR', 'AU', 'CA', 
            'NL', 'BE', 'CH', 'AT', 'SE', 'NO', 'DK', 'FI', 'PL', 'CZ', 
            'GR', 'TR', 'MX', 'IN', 'ZA', 'AR', 'CL', 'PE', 'PT', 'IE', 'NZ'
        ];

        // Composant Carte
        const MapComponent = ({ lat, lon, name }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);

            useEffect(() => {
                if (!mapInstance.current && mapRef.current) {
                    // Zoom réglé à 5 (échelle du pays)
                    mapInstance.current = L.map(mapRef.current).setView([lat, lon], 5);
                    
                    // Utilisation de CartoDB pour éviter l'erreur de Referer d'OSM
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                        subdomains: 'abcd',
                        maxZoom: 20
                    }).addTo(mapInstance.current);

                    L.marker([lat, lon]).addTo(mapInstance.current)
                        .bindPopup(`<strong style="font-family:'Playfair Display', serif">${name}</strong>`)
                        .openPopup();
                } else if (mapInstance.current) {
                    mapInstance.current.setView([lat, lon], 5);
                }

                return () => {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                    }
                };
            }, [lat, lon, name]);

            return <div ref={mapRef} className="w-full h-80 md:h-[500px] map-container"></div>;
        };

        const App = () => {
            const [museum, setMuseum] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [loadingStep, setLoadingStep] = useState("Initialisation...");

            // Helper pour éviter les problèmes de fuseau horaire
            const getLocalDateStr = (date) => {
                const d = new Date(date);
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                return d.toISOString().split('T')[0];
            };

            const isToday = () => {
                const today = new Date();
                return getLocalDateStr(currentDate) === getLocalDateStr(today);
            };

            useEffect(() => {
                const fetchMuseum = async () => {
                    setLoading(true);
                    setError(null);
                    try {
                        // 1. Définir la graine du jour
                        const dateStr = getLocalDateStr(currentDate);
                        setLoadingStep(`Préparation de l'exploration pour le ${currentDate.toLocaleDateString('fr-FR')}...`);
                        
                        // Vérifier le cache pour éviter d'inonder l'API Overpass à chaque rafraîchissement
                        const cacheKey = `musee_juan_${dateStr}`;
                        const cached = localStorage.getItem(cacheKey);
                        if (cached) {
                            setMuseum(JSON.parse(cached));
                            setLoading(false);
                            return;
                        }

                        // Préparation de l'algorithme déterministe
                        const seedFunc = xmur3(dateStr);
                        
                        // Si l'API échoue, on re-testera avec un autre pays (seed offset)
                        let attempts = 0;
                        let finalData = null;

                        while (attempts < 5 && !finalData) {
                            const rand = mulberry32(seedFunc() + attempts);
                            
                            // 2. Choix aléatoire du pays
                            const countryCode = COUNTRIES[Math.floor(rand() * COUNTRIES.length)];
                            console.log(`Tentative ${attempts + 1}: Pays sélectionné -> ${countryCode}`);
                            setLoadingStep(`Recherche d'un musée en ${countryCode} via OpenStreetMap...`);

                            try {
                                // 3. Requête à l'API Overpass (OpenStreetMap)
                                // Remise du timeout à 25s
                                const overpassQuery = `
                                    [out:json][timeout:25];
                                    area["ISO3166-1"="${countryCode}"]->.searchArea;
                                    nwr["tourism"="museum"]["wikidata"](area.searchArea);
                                    out center;
                                `;

                                const opRes = await fetch("https://overpass-api.de/api/interpreter", {
                                    method: 'POST',
                                    body: overpassQuery
                                });
                                
                                if (!opRes.ok) {
                                    console.warn(`L'API Overpass a renvoyé l'erreur ${opRes.status} pour le pays ${countryCode}. Essai suivant.`);
                                    attempts++;
                                    continue;
                                }
                                
                                const opData = await opRes.json();
                                
                                // Filtrer les résultats valides
                                const elements = opData.elements.filter(e => e.tags && e.tags.name && e.tags.wikidata);
                                
                                if (elements.length > 0) {
                                    setLoadingStep(`Musée trouvé ! Récupération des données Wikidata...`);
                                    // 4. Choix aléatoire du musée parmi la liste du pays
                                    const selectedElement = elements[Math.floor(rand() * elements.length)];
                                    
                                    const lat = selectedElement.lat || selectedElement.center?.lat;
                                    const lon = selectedElement.lon || selectedElement.center?.lon;
                                    const wikidataId = selectedElement.tags.wikidata;
                                    const name = selectedElement.tags.name;
                                    const tags = selectedElement.tags;

                                    setLoadingStep(`Recherche de photos et descriptions pour "${name}"...`);

                                    // 5. Enrichissement des données via Wikidata / Wikipedia (pour les photos et descriptions)
                                    const wdRes = await fetch(`https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${wikidataId}&props=claims|sitelinks|descriptions&languages=fr|en&format=json&origin=*`);
                                    const wdData = await wdRes.json();
                                    const entity = wdData.entities[wikidataId];

                                    let imageUrl = null;
                                    let description = "Aucune description détaillée n'est disponible pour ce musée pour le moment.";
                                    let wikiUrl = tags.website || tags.wikipedia || null;

                                    // Récupération de l'image (Propriété P18 sur Wikidata)
                                    if (entity && entity.claims && entity.claims.P18) {
                                        const fileName = entity.claims.P18[0].mainsnak.datavalue.value;
                                        imageUrl = `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(fileName)}?width=1000`;
                                    }

                                    // Récupération de la description Wikipédia
                                    if (entity && entity.sitelinks && entity.sitelinks.frwiki) {
                                        const wikiTitle = entity.sitelinks.frwiki.title;
                                        wikiUrl = `https://fr.wikipedia.org/wiki/${encodeURIComponent(wikiTitle)}`;
                                        try {
                                            const wikiRes = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
                                            const wikiData = await wikiRes.json();
                                            if (wikiData.extract) description = wikiData.extract;
                                            if (!imageUrl && wikiData.thumbnail) imageUrl = wikiData.thumbnail.source;
                                        } catch (e) { console.log("Wiki fetch failed", e); }
                                    } else if (entity && entity.descriptions && entity.descriptions.fr) {
                                        description = entity.descriptions.fr.value;
                                    }

                                    finalData = {
                                        id: selectedElement.id,
                                        name, lat, lon, countryCode,
                                        wikidataId, imageUrl, description, wikiUrl, tags
                                    };
                                } else {
                                    attempts++;
                                }
                            } catch (innerErr) {
                                console.warn(`Erreur réseau ou d'API à la tentative ${attempts + 1}:`, innerErr);
                                attempts++;
                            }
                        }

                        if (finalData) {
                            localStorage.setItem(cacheKey, JSON.stringify(finalData));
                            setMuseum(finalData);
                        } else {
                            throw new Error("Impossible de trouver un musée pour cette date.");
                        }

                    } catch (err) {
                        console.error(err);
                        setError("Oups, l'exploration a échoué. Les archives semblent inaccessibles.");
                    } finally {
                        setLoading(false);
                    }
                };

                fetchMuseum();
            }, [currentDate]);

            if (loading) {
                return (
                    <div className="flex-grow flex flex-col items-center justify-center bg-gray-50 p-6">
                        <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <h2 className="serif text-2xl text-gray-700 text-center mb-2">Un instant, Juan...</h2>
                        <p className="text-indigo-600 font-medium text-center bg-indigo-50 px-4 py-2 rounded-full mb-4">{loadingStep}</p>
                        <p className="text-gray-500 text-center max-w-md text-sm">L'algorithme parcourt le monde de manière déterministe.</p>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex-grow flex items-center justify-center">
                        <div className="bg-red-50 p-8 rounded-xl text-center max-w-lg border border-red-100">
                            <h2 className="serif text-2xl text-red-800 mb-4">{error}</h2>
                            <button onClick={() => window.location.reload()} className="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">Réessayer</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-grow flex flex-col fade-in">
                    {/* Header */}
                    <header className="bg-indigo-900 text-white py-8 px-6 shadow-lg">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
                            <div className="text-center md:text-left mb-4 md:mb-0">
                                <h1 className="text-3xl md:text-4xl font-bold serif mb-2">1 Jour 1 Musée</h1>
                                <p className="text-indigo-200 text-sm md:text-base tracking-wide uppercase font-semibold">Une découverte quotidienne pour Juan, Muséologue</p>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button 
                                    onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate() - 1); setCurrentDate(d); }}
                                    className="p-2 bg-indigo-800 hover:bg-indigo-700 rounded-full transition text-white"
                                    title="Jour précédent"
                                >
                                    <Icons.ChevronLeft />
                                </button>
                                
                                <div className="flex items-center bg-indigo-800/50 px-4 py-2 rounded-full border border-indigo-700 min-w-[200px] justify-center">
                                    <Icons.Calendar />
                                    <span className="ml-2 font-medium capitalize whitespace-nowrap">
                                        {currentDate.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                    </span>
                                </div>

                                <button 
                                    onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate() + 1); setCurrentDate(d); }}
                                    disabled={isToday()}
                                    className={`p-2 rounded-full transition text-white ${isToday() ? 'bg-indigo-900/50 opacity-50 cursor-not-allowed' : 'bg-indigo-800 hover:bg-indigo-700'}`}
                                    title="Jour suivant"
                                >
                                    <Icons.ChevronRight />
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow p-6 py-10">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
                            
                            {/* Left Column: Info */}
                            <div className="lg:col-span-5 flex flex-col space-y-8">
                                <div>
                                    <div className="inline-flex items-center space-x-2 bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-semibold mb-4 border border-indigo-100">
                                        <Icons.Globe />
                                        <span>Sélection aléatoire mondiale</span>
                                    </div>
                                    <h2 className="text-4xl font-bold serif text-gray-900 leading-tight mb-4">{museum.name}</h2>
                                    
                                    <div className="flex items-center text-gray-600 mb-6 bg-gray-100 p-3 rounded-lg inline-block">
                                        <Icons.MapPin />
                                        <span className="ml-2 font-medium">Pays : {museum.countryCode} • {museum.lat.toFixed(4)}, {museum.lon.toFixed(4)}</span>
                                    </div>
                                </div>

                                {museum.imageUrl ? (
                                    <div className="rounded-xl overflow-hidden shadow-md bg-gray-200 relative group">
                                        <img 
                                            src={museum.imageUrl} 
                                            alt={museum.name} 
                                            className="w-full h-72 object-cover object-center transition duration-500 group-hover:scale-105"
                                        />
                                    </div>
                                ) : (
                                    <div className="w-full h-40 bg-gray-200 rounded-xl flex flex-col items-center justify-center text-gray-500 border-2 border-dashed border-gray-300">
                                        <Icons.Info />
                                        <span className="mt-2 text-sm">Aucune photo libre de droits disponible</span>
                                    </div>
                                )}

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative">
                                    <h3 className="serif text-xl font-bold text-gray-800 mb-3 border-b pb-2">À propos</h3>
                                    <p className="text-gray-600 leading-relaxed text-justify mb-4">
                                        {museum.description}
                                    </p>
                                    
                                    <div className="flex flex-wrap gap-3 mt-6">
                                        {museum.wikiUrl && (
                                            <a href={museum.wikiUrl} target="_blank" rel="noopener noreferrer" 
                                               className="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition text-sm font-medium">
                                                En savoir plus <span className="ml-2"><Icons.ExternalLink /></span>
                                            </a>
                                        )}
                                        {museum.tags.website && (
                                            <a href={museum.tags.website} target="_blank" rel="noopener noreferrer" 
                                               className="inline-flex items-center px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg transition text-sm font-medium">
                                                Site officiel
                                            </a>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Right Column: Map */}
                            <div className="lg:col-span-7 flex flex-col">
                                <div className="bg-white p-2 rounded-xl shadow-md border border-gray-100 mb-4">
                                    <MapComponent lat={museum.lat} lon={museum.lon} name={museum.name} />
                                </div>
                                
                                {/* OSM Tags Info Box */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                                    {museum.tags.opening_hours && (
                                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-50 col-span-2">
                                            <span className="block text-xs text-gray-500 uppercase font-semibold mb-1">Horaires (Bruts OSM)</span>
                                            <span className="text-sm font-medium text-gray-800">{museum.tags.opening_hours}</span>
                                        </div>
                                    )}
                                    {museum.tags.fee && (
                                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-50">
                                            <span className="block text-xs text-gray-500 uppercase font-semibold mb-1">Entrée payante</span>
                                            <span className="text-sm font-medium text-gray-800">{museum.tags.fee === 'yes' ? 'Oui' : museum.tags.fee === 'no' ? 'Non / Gratuit' : museum.tags.fee}</span>
                                        </div>
                                    )}
                                    <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-50">
                                        <span className="block text-xs text-gray-500 uppercase font-semibold mb-1">Identifiant Wikidata</span>
                                        <a href={`https://www.wikidata.org/wiki/${museum.wikidataId}`} target="_blank" className="text-sm font-medium text-indigo-600 hover:underline">{museum.wikidataId}</a>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-900 text-gray-400 py-6 text-center text-sm">
                        <p>Conçu pour Juan • Propulsé par <a href="https://wiki.openstreetmap.org/wiki/Overpass_API" className="text-indigo-400 hover:underline" target="_blank">Overpass API (OSM)</a> & <a href="https://www.wikidata.org/" className="text-indigo-400 hover:underline" target="_blank">Wikidata</a></p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
